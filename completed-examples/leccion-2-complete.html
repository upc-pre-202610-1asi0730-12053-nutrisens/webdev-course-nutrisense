<!DOCTYPE html>
<html>
  <head>
    <!-- El head es la trastienda: el navegador lo necesita pero el usuario no lo ve -->
    <title>Mi página</title>
  </head>
  <body>
    <!-- Aquí empieza lo visible -->

    <!-- Elemento con atributo id (identificador único) y class (pegatina de grupo) -->
    <p id="intro" class="destacado">Este es mi primer párrafo.</p>

    <!-- Otro párrafo, con su etiqueta de cierre correctamente puesta -->
    <p><b>Este es otro párrafo.</b></p>

    <!-- Ejemplo corregido: etiquetas cerradas correctamente -->
    <!-- MAL: <p><b>Este párrafo no tiene cierre -->
    <!-- BIEN: -->
    <p><b>Este párrafo sí tiene cierre.</b></p>
    <p>Este es otro párrafo.</p>
  </body>
</html>
