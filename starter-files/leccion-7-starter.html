<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lección 7 — Encuentra los errores</title>
    <style>
        /* ¿Puedes encontrar los errores en este CSS? */

        /* Error CSS 1 */
        p {
            color blue
        }

        /* Error CSS 2: ¿padding o margin? */
        .caja {
            background-color: lightblue;
            padding: 30px;
        }
    </style>
</head>
<body>
    <!-- ¿Puedes encontrar los errores en este HTML? -->

    <!-- Error HTML 1: Etiqueta sin cerrar correctamente -->
    <p>Este texto tiene algo <b>importante aquí
    <p>Y este párrafo también</p>

    <!-- Error HTML 2: Nombre de etiqueta mal escrita -->
    <imge src="https://images.pexels.com/photos/821365/pexels-photo-821365.jpeg?auto=compress&cs=tinysrgb&w=500" alt="Una imagen de prueba">

    <!-- Error HTML 3: Imagen sin atributo alt -->
    <img src="https://imagen-que-no-existe.com/foto.jpg">

    <!-- Demo padding vs margin -->
    <div class="caja">
        <p>Contenido de la caja</p>
    </div>
</body>
</html>
